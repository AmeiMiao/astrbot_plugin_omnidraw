<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <title>万象画卷 - 插件管理面板</title>
    <link rel="stylesheet" href="./style.css" />
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 万象画卷管理面板</h1>
            <p>管理您的生图节点、副脑预设及人设信息</p>
        </header>

        <main id="app">
            <section class="card">
                <h2>🛡️ 权限与核心开关</h2>
                <div class="form-group">
                    <label>允许使用的QQ号 (逗号分隔)</label>
                    <input type="text" id="allowed_users" />
                </div>
                <div class="form-group">
                    <label>副脑总开关</label>
                    <input type="checkbox" id="enable_optimizer" />
                </div>
            </section>

            <div id="dynamic-sections"></div>

            <footer>
                <button id="save-btn" class="primary">保存所有配置</button>
                <span id="status-msg"></span>
            </footer>
        </main>
    </div>
    <script type="module" src="./app.js"></script>
</body>
</html>
