<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <title>万象画卷 - 高级控制台</title>
    <link rel="stylesheet" href="./style.css" />
</head>
<body>
    <div class="layout-wrapper">
        <aside class="sidebar fade-in">
            <div class="sidebar-header">
                <div class="brand">
                    <span class="icon">🎨</span>
                    <h1>万象画卷</h1>
                </div>
                <span class="version-badge">v3.1 Pro</span>
            </div>
            
            <nav class="nav-menu">
                <button class="nav-item active" data-target="tab-basic">
                    <span class="nav-icon">⚙️</span> 基础与人设
                </button>
                <button class="nav-item" data-target="tab-optimizer">
                    <span class="nav-icon">🧠</span> 副脑与预设
                </button>
                <button class="nav-item" data-target="tab-nodes">
                    <span class="nav-icon">🔌</span> API节点管理
                </button>
            </nav>

            <div class="save-panel">
                <button data-action="save-config" class="btn-primary ripple">
                    💾 保存所有配置
                </button>
            </div>
        </aside>

        <main class="content">
            
            <div id="tab-basic" class="tab-pane active fade-in-up">
                <div class="page-header">
                    <h2>基础配置</h2>
                    <p>管理全局权限、路由指向以及 AI 助理的固定人设参数。</p>
                </div>
                
                <div class="grid-row">
                    <section class="card">
                        <div class="card-header"><h3>🛡️ 权限与路由</h3></div>
                        <div class="card-body">
                            <div class="form-group">
                                <label>允许使用的QQ号 (留空全员可用)</label>
                                <input type="text" id="perm_allowed_users" class="input-modern" placeholder="例: 123456,888888" />
                            </div>
                            <div class="divider"></div>
                            <div class="form-group">
                                <label>🔗 画图指令绑定节点 (chain_text2img)</label>
                                <input type="text" id="route_img" class="input-modern" />
                            </div>
                            <div class="form-group">
                                <label>🔗 自拍指令绑定节点 (chain_selfie)</label>
                                <input type="text" id="route_selfie" class="input-modern" />
                            </div>
                            <div class="form-group">
                                <label>🔗 视频指令绑定节点 (chain_video)</label>
                                <input type="text" id="route_video" class="input-modern" />
                            </div>
                        </div>
                    </section>

                    <section class="card">
                        <div class="card-header"><h3>🎭 固定人设定制</h3></div>
                        <div class="card-body">
                            <div class="form-group">
                                <label>助理名称</label>
                                <input type="text" id="persona_name" class="input-modern" placeholder="默认助理" />
                            </div>
                            <div class="form-group">
                                <label>外貌特征 (Base Prompt)</label>
                                <textarea id="persona_prompt" rows="3" class="input-modern" placeholder="masterpiece, best quality..."></textarea>
                            </div>
                            <div class="form-group">
                                <label>形象参考图 (网络 URL 或 绝对路径)</label>
                                <input type="text" id="persona_ref" class="input-modern" placeholder="https://..." />
                            </div>
                        </div>
                    </section>
                </div>
            </div>

            <div id="tab-optimizer" class="tab-pane fade-in-up">
                <div class="page-header">
                    <h2>副脑引擎 & 预设库</h2>
                    <p>配置大语言模型作为提示词“副脑”，以及快捷图生图预设指令。</p>
                </div>

                <section class="card highlight-card">
                    <div class="card-header space-between">
                        <h3>🧠 Prompt Optimizer 引擎</h3>
                        <label class="toggle-switch">
                            <input type="checkbox" id="opt_enable">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="card-body grid-2-col">
                        <div class="form-group">
                            <label>✨ 副脑预设画风</label>
                            <select id="opt_style" class="input-modern">
                                <option value="手机日常原生感">手机日常原生感</option>
                                <option value="自拍专用极致真实">自拍专用极致真实</option>
                                <option value="电影级光影大片">电影级光影大片</option>
                                <option value="日系插画大师">日系插画大师</option>
                                <option value="3D 潮玩盲盒">3D 潮玩盲盒</option>
                                <option value="自定义模式">自定义模式</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>执行链路 (节点ID)</label>
                            <input type="text" id="opt_chain" class="input-modern" />
                        </div>
                        <div class="form-group">
                            <label>优化模型 (推荐 gpt-4o-mini)</label>
                            <input type="text" id="opt_model" class="input-modern" />
                        </div>
                        <div class="form-group">
                            <label>超时时间 (秒)</label>
                            <input type="number" id="opt_timeout" class="input-modern" />
                        </div>
                        <div class="form-group full-width">
                            <label>单次并发批量上限 (0为不限)</label>
                            <input type="number" id="opt_batch" class="input-modern" />
                        </div>
                        <div class="form-group full-width">
                            <label>✍️ 自定义注入词 (仅选择【自定义模式】时生效)</label>
                            <textarea id="opt_custom" rows="2" class="input-modern" placeholder="在此输入自定义画风要求..."></textarea>
                        </div>
                    </div>
                </section>

                <section class="card">
                    <div class="card-header space-between">
                        <h3>✨ 快捷改图预设 (Presets)</h3>
                        <button data-action="add-preset" class="btn-success btn-small ripple">+ 新增预设</button>
                    </div>
                    <div class="card-body list-container" id="presets-container"></div>
                </section>
            </div>

            <div id="tab-nodes" class="tab-pane fade-in-up">
                <div class="page-header">
                    <h2>API 节点管理</h2>
                    <p>管理底层的图像与视频生成模型接口，支持无限扩展与负载均衡。</p>
                </div>

                <section class="card">
                    <div class="card-header space-between">
                        <h3>🎨 图像生成节点</h3>
                        <button data-action="add-provider" class="btn-primary btn-small ripple">+ 添加生图节点</button>
                    </div>
                    <div class="card-body list-container" id="providers-container"></div>
                </section>

                <section class="card">
                    <div class="card-header space-between">
                        <h3>🎬 视频生成节点</h3>
                        <button data-action="add-video-provider" class="btn-primary btn-small ripple">+ 添加视频节点</button>
                    </div>
                    <div class="card-body list-container" id="video-providers-container"></div>
                </section>
            </div>

        </main>
    </div>

    <div id="toast-container"></div>
    <script type="module" src="./app.js"></script>
</body>
</html>
